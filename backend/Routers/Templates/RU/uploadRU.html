<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница загрузки снимков</title>
    <link rel="stylesheet" href="/Static/CSS/styles.css">
</head>
<body>
    <div class="container">
        <h1>Страница загрузки</h1>
        <form id="uploadForm" action="/upload/" method="post" enctype="multipart/form-data">
            <input id="fileInput" type="file" name="user_images" multiple>
            <button class="btn" type="submit">Upload</button>
            <a class="btn" href="/">Вернуться на главную страницу</a>
        </form>
        <div id="progressBarContainer" style="display: none;">
            <div id="progressBar"></div>
        </div>
        <div id="progressStatus"></div>
        <div><p>{{ error_message }}</p></div>
    </div>
    <script src="/Static/JS/uploadFile.js"></script>
</body>
</html>
